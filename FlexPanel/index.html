<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Favorite Albums</title>
        <link rel="shortcut icon" href="icon.png">
    </head>

    <body>
        <style>
            html {
                box-sizing: border-box;
                background: #ffffff;
                font-family: sans-serif;
                font-size: 20px;
                font-weight: 200;
            }
            
            body {
                margin: 0;
            }
            
            *, *:before, *:after {
                box-sizing: inherit;
            }

            .panels {
                min-height: 100vh;
                overflow: hidden;
                display: flex;
            }

            .panel {
                background: #6B0F9C;
                box-shadow: inset 0 0 0 5px rgba(255,255,255,0.1);
                color: white;
                text-align: center;
                align-items: center;
                /* Safari transitionend event.propertyName === flex */
                /* Chrome + FF transitionend event.propertyName === flex-grow */
                transition:
                    font-size 0.4s cubic-bezier(1,-0.19, 1,-0.11),
                    flex 0.6s cubic-bezier(0.61,-0.19, 0.7,-0.11),
                    background 0.2s;
                font-size: 20px;
                background-size: cover;
                background-position: center;
                flex: 1;
                justify-content: center;
                display: flex;
                flex-direction: column;
            }

            .panel1 { background-image:url('covers/Blonde.jpg'); }
            .panel2 { background-image:url('covers/HowImFeelingNow.jpg'); }
            .panel3 { background-image:url('covers/NormanFuckingRockwell.png'); }
            .panel4 { background-image:url('covers/VolumeAlpha.jpg'); }
            .panel5 { background-image:url('covers/Yeezus.jpg'); }

            /* Flex Children */
            .panel > * {
                margin: 0;
                width: 100%;
                transition: transform 0.1s;
                flex: 1 0 auto;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .panel > *:first-child { transform: translateY(-100%); }
            .panel.open-active > *:first-child { transform: translateY(0); }
            .panel > *:last-child { transform: translateY(100%); }
            .panel.open-active > *:last-child { transform: translateY(0); }

            .panel p {
                text-transform: uppercase;
                font-family: sans-serif;
                justify-content: center;
                align-items: center;
                text-shadow: 0 0 4px rgba(0, 0, 0, 0.72), 0 0 14px rgba(0, 0, 0, 0.45);
                font-size: 1.7em;
            }
            
            .panel p:nth-child(2) {
                font-size: 1.7em;
            }

            .panel.open {
                flex: 5;
                font-size: 1em;
            }

        </style>


        <div class="panels">
            <div class="panel panel1">
                <p>2016</p>
                <p>Blonde</p>
                <p>by Frank Ocean</p>
            </div>
            <div class="panel panel2">
                <p>2020</p>
                <p>How I'm Feeling Now</p>
                <p>by Charli XCX</p>
            </div>
            <div class="panel panel3">
                <p>2019</p>
                <p>Norman Fucking Rockwell</p>
                <p>by Lana Del Rey</p>
            </div>
            <div class="panel panel4">
                <p>2011</p>
                <p>Volume Alpha</p>
                <p>by C418</p>
            </div>
            <div class="panel panel5">
                <p>2013</p>
                <p>Yeezus</p>
                <p>by Kanye West</p>
            </div>
        </div>

        <script>
        
            const panels = document.querySelectorAll('.panel');
            
            function toggleOpen() {
                this.classList.toggle('open');
            }

            function toggleActive(e) {
                if (e.propertyName.includes('flex')) {
                    this.classList.toggle('open-active'); 
                }
            }

            panels.forEach(panel => panel.addEventListener('click', toggleOpen));
            panels.forEach(panel => panel.addEventListener('transitionend', toggleActive));
        
        </script>
    </body>

</html>
