<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>Clock</title>
    </head>
    
    <body>      
        <div class="clock">
            <div class="clock-face">
                <div class="hour">
                    <span class="a"><strong>12</strong></span>
                    <span class="b"><strong>1</strong></span>
                    <span class="c"><strong>2</strong></span>
                    <span class="d"><strong>3</strong></span>
                    <span class="e"><strong>4</strong></span>
                    <span class="f"><strong>5</strong></span>
                    <span class="g"><strong>6</strong></span>
                    <span class="h"><strong>7</strong></span>
                    <span class="i"><strong>8</strong></span>
                    <span class="j"><strong>9</strong></span>
                    <span class="k"><strong>10</strong></span>
                    <span class="l"><strong>11</strong></span>
                </div>
                <div class="hand hour-hand"></div>
                <div class="hand min-hand"></div>
                <div class="hand second-hand"></div>
            </div>
        </div>

        <style>

            html {
                background: #018DED;
                background-size: cover;
                font-family: 'helvetica neue';
                text-align: center;
                font-size: 10px;
            }

            body {
                margin: 0;
                font-size: 2rem;
                display: flex;
                flex: 1;
                min-height: 100vh;
                align-items: center;
            }

            .clock {
                width: 30rem;
                height: 30rem;
                border: 20px solid rgb(255, 255, 255);
                border-radius: 50%;
                margin: 50px auto;
                position: relative;
                padding: 2rem;
                box-shadow: inset 0 0 10px rgb(0, 0, 0);
            }

            .hour span {
                text-align: center;
                color: aliceblue;
                height: 30rem;
                position: absolute;
                left: 47%;
                top: 1.5%;
            }

            .a { transform: rotate(0deg); }
            .b { transform: rotate(30deg); }
            .c { transform: rotate(60deg); }
            .d { transform: rotate(90deg); }
            .e { transform: rotate(120deg); }
            .f { transform: rotate(150deg); }
            .g { transform: rotate(180deg); }
            .h { transform: rotate(210deg); }
            .i { transform: rotate(240deg); }
            .j { transform: rotate(270deg); }
            .k { transform: rotate(300deg); }
            .l { transform: rotate(330deg); }

            .clock-face {
                position: relative;
                width: 100%;
                height: 100%;
                transform: translateY(-3px); /* account for the height of the clock hands */
            }

            .hand {
                width: 50%;
                height: 3px;
                background: rgb(255, 255, 255);
                position: absolute;
                top: 50%;
                transform-origin: 100%;
                transform: rotate(90deg);
                transition: all 0.005s;
                transition-timing-function: cubic-bezier(0.1, 2.7, 0.57, 1);
            }

        </style>

        <script>
        
            const secondHand = document.querySelector('.second-hand');
            const minuteHand = document.querySelector('.min-hand');
            const hourHand = document.querySelector('.hour-hand')

            function setDate() {
                const now = new Date();

                const seconds = now.getSeconds();
                const minutes = now.getMinutes();
                const hours = now.getHours();
                
                const secondsDegrees = ((seconds / 60) * 360) + 90;
                const minutesDegrees = ((minutes / 60) * 360) + (seconds / 10) + 90;
                const hoursDegrees = ((hours / 12) * 360) + (minutes / 2) + 90;

                secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
                minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
                hourHand.style.transform = `rotate(${hoursDegrees}deg)`;

                console.log(seconds);
                console.log(secondsDegrees);

            }

            setInterval(setDate, 1000);

        </script>
    </body>

</html>
